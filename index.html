const DOC_REF = doc(db, "nickel", "data");

window._fbSave = async function(d) {
  try { await setDoc(DOC_REF, { payload: JSON.stringify(d) }); } catch(e) { console.error("Firebase save error:", e); }
};
window._fbLoad = async function() {
  try { const snap = await getDoc(DOC_REF); if(snap.exists()) return JSON.parse(snap.data().payload); } catch(e) { console.error("Firebase load error:", e); }
  return null;
};
window._fbListen = function(callback) {
  return onSnapshot(DOC_REF, (snap) => {
    if(snap.exists()) { try { const d = JSON.parse(snap.data().payload); callback(d); } catch(e) {} }
  });
};
window._firebaseReady = true;
document.dispatchEvent(new Event('firebase-ready'));

function drawCharts(){
  const dias={};const hoy=new Date();
  for(let i=29;i>=0;i--){const d=new Date(hoy);d.setDate(d.getDate()-i);dias[d.toISOString().split('T')[0]]=0;}
  data.ventas.forEach(v=>{if(dias[v.fecha]!==undefined)dias[v.fecha]+=v.total;});
  const cv=document.getElementById('chart-ventas');
  if(cv)new Chart(cv,{type:'line',data:{labels:Object.keys(dias).map(d=>{const p=d.split('-');return p[2]+'/'+p[1];}),datasets:[{data:Object.values(dias),borderColor:'#1e8fcf',backgroundColor:'rgba(30,143,207,0.08)',borderWidth:2,pointRadius:3,pointBackgroundColor:'#1e8fcf',tension:0.3,fill:true}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#64748b',font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
  const ce=document.getElementById('chart-estado');
  if(ce)new Chart(ce,{type:'doughnut',data:{labels:['Cobradas','Pendientes','Canceladas'],datasets:[{data:[data.ventas.filter(v=>v.estado==='cobrado').length,data.ventas.filter(v=>v.estado==='pendiente').length,data.ventas.filter(v=>v.estado==='cancelado').length],backgroundColor:['rgba(34,197,94,0.7)','rgba(245,158,11,0.7)','rgba(239,68,68,0.7)'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},padding:10}}}}});
}

window.buscarClienteVenta=function(val){
  const lista=document.getElementById('m-cliente-lista');
  if(!lista)return;
  const q=(val||'').toLowerCase().trim();
  if(q.length<1){lista.style.display='none';return;}
  const vistos={};
  const clientes=[];
  // 1. Primero buscar en contactos (tipo cliente)
  (data.contactos||[]).filter(c=>c.tipo==='cliente').forEach(c=>{
    const key=(c.nombre||'').toLowerCase();
    if(!vistos[key]&&key.includes(q)){
      vistos[key]=true;
      clientes.push({nombre:c.nombre,tel:c.telefono||'',dni:'',fuente:'contacto'});
    }
  });
  // 2. Luego del historial de ventas
  data.ventas.forEach(v=>{
    const key=(v.cliente||'').toLowerCase();
    if(!vistos[key]&&key.includes(q)){
      vistos[key]=true;
      clientes.push({nombre:v.cliente,tel:v.clienteTel||'',dni:v.clienteDni||'',fuente:'historial'});
    }
  });
  if(!clientes.length){lista.style.display='none';return;}
  lista.innerHTML=clientes.slice(0,10).map(c=>`

function getBrubankMovs(){if(!data.brubank)data.brubank=[];return data.brubank;}

  return data.ventas.filter(v=>v.medioPago==='tarjeta-santander'&&!v.brubankLiquidado);
}
// 48hs hábiles = saltear sábado y domingo
function addHorasHabiles(fecha, horas){
  let d=new Date(fecha);
  let horasRestantes=horas;
  while(horasRestantes>0){
    d.setHours(d.getHours()+1);
    const dia=d.getDay();
    if(dia!==0&&dia!==6) horasRestantes--;
  }
  return d;
}
function getBrubankVencidas(){
  const hoy=new Date();
  return getBrubankPendientes().filter(v=>{
    if(!v.fecha)return false;
    const fechaVenta=new Date(v.fecha+'T12:00:00');
    const limite=addHorasHabiles(fechaVenta,48);
    return hoy>limite;
  });
}

// La semana corre de miércoles a martes. El cobro es el miércoles 21 días después del cierre de semana (martes).
function getRapicuotaSemana(fechaStr){
  // Semana: mié→mar. Cobro = martes de cierre + 22 días (= miércoles siguiente 3 semanas después)
  const d=new Date(fechaStr+'T12:00:00');
  const dow=d.getDay();
  const retro=dow===3?0:dow===4?1:dow===5?2:dow===6?3:dow===0?4:dow===1?5:dow===2?6:0;
  const inicio=new Date(d);inicio.setDate(d.getDate()-retro);
  const cierre=new Date(inicio);cierre.setDate(inicio.getDate()+6); // martes
  const cobro=new Date(cierre);cobro.setDate(cierre.getDate()+22); // mié exacto
  const fmt2=dt=>dt.toISOString().split('T')[0];
  return{inicio:fmt2(inicio),cierre:fmt2(cierre),cobro:fmt2(cobro)};
}
function getRapicuotaVentas(){
  return data.ventas.filter(v=>v.medioPago==='rapicuota'&&v.estado!=='cancelado');
}
function getRapicuotaPendientes(){
  return getRapicuotaVentas().filter(v=>!v.rapicuotaLiquidado);
}
function getRapicuotaSemanasAgrupadas(){
  const ventas=getRapicuotaVentas();
  const mapa={};
  ventas.forEach(v=>{
    const sem=getRapicuotaSemana(v.fecha);
    const key=sem.inicio;
    if(!mapa[key])mapa[key]={inicio:sem.inicio,cierre:sem.cierre,cobro:sem.cobro,ventas:[]};
    mapa[key].ventas.push(v);
  });
  return Object.values(mapa).sort((a,b)=>b.inicio.localeCompare(a.inicio));
}

function getMpMovs(){if(!data.mercadopago)data.mercadopago=[];return data.mercadopago;}
function getSaldoMp(){
  // Ingresos/egresos registrados manualmente en data.mercadopago
  const movsSaldo=getMpMovs().reduce((s,m)=>s+(m.tipo==='ingreso'?m.monto:-m.monto),0);
  // IDs de ventas que ya tienen movimiento registrado en data.mercadopago
  const ventasConMov=new Set(getMpMovs().filter(m=>m.tipo==='ingreso'&&m.descripcion&&m.descripcion.startsWith('Venta #')).map(m=>{const match=m.descripcion.match(/Venta #(\d+)/);return match?parseInt(match[1]):null;}).filter(Boolean));
  // Ventas MP que NO tienen movimiento registrado (las migradas de transferencia)
  const ventasSinMov=data.ventas.filter(v=>(v.medioPago==='mercadopago'||v.medioPago==='transferencia')&&v.cobrado>0&&v.estado!=='cancelado'&&!ventasConMov.has(v.id)).reduce((s,v)=>s+v.cobrado,0);
  return movsSaldo+ventasSinMov;
}

function getTurnoActivo(){

}
function getHoraActual(){
  return new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
function getFechaHoyISO(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function calcTotalesTurno(turno){
  const fechaTurno=turno.fecha;
  // Filtrar ventas por fecha Y por vendedor si el turno tiene vendedorId asignado
  const vendedorId=turno.usuarioVendedorId||null;
  const ventasTurno=data.ventas.filter(v=>{
    if(!v.cobrado||v.cobrado<=0)return false;
    if(v.fecha!==fechaTurno)return false;
    // Si el turno tiene vendedor asignado, filtrar por ese vendedor
    if(vendedorId&&v.vendedorId&&v.vendedorId!==vendedorId)return false;
    return true;
  });
  const egresosTurno=(data.egresos||[]).filter(e=>e.pagado&&e.fecha===fechaTurno);
  const cobranzaCredivipTurno=(data.cobranzaCredivip||[]).filter(c=>c.monto>0&&c.fecha===fechaTurno);
  const cobranzaRapicuotaTurno=(data.cobranzaRapicuota||[]).filter(c=>c.monto>0&&c.fecha===fechaTurno);
  const cobranzaPagaresTurno=(data.cobranzaPagares||[]).filter(c=>c.monto>0&&c.fecha===fechaTurno);
  const totalCobrCredivip=cobranzaCredivipTurno.reduce((s,c)=>s+c.monto,0);
  const totalCobrRapicuota=cobranzaRapicuotaTurno.reduce((s,c)=>s+c.monto,0);
  const totalCobrPagares=cobranzaPagaresTurno.reduce((s,c)=>s+c.monto,0);
  const medios={efectivo:0,mercadopago:0,tarjeta:0,credivip:0,rapicuota:0,'nickcel-pagares':0,otros:0};
  ventasTurno.forEach(v=>{
    const mp=v.medioPago||'efectivo';
    if(mp==='efectivo')medios.efectivo+=v.cobrado;
    else if(mp==='mercadopago')medios.mercadopago+=v.cobrado;
    else if(mp==='tarjeta'||mp==='tarjeta-nbch'||mp==='tarjeta-santander'||mp==='tarjeta-galicia')medios.tarjeta+=v.cobrado;
    else if(mp==='credivip')medios.credivip+=v.cobrado;
    else if(mp==='rapicuota')medios.rapicuota+=v.cobrado;
    else if(mp==='nickcel-pagares')medios['nickcel-pagares']+=v.cobrado;
    else medios.otros+=v.cobrado;
  });
  const totalVentas=Object.values(medios).reduce((s,v)=>s+v,0);
  const totalEgresos=egresosTurno.reduce((s,e)=>s+e.monto,0);
  const totalFinancieras=totalCobrCredivip+totalCobrRapicuota+totalCobrPagares;
  const cobrFinancierasEfectivo=[...cobranzaCredivipTurno,...cobranzaRapicuotaTurno,...cobranzaPagaresTurno].filter(c=>c.formaPago==='efectivo'||!c.formaPago).reduce((s,c)=>s+c.monto,0);
  // Efectivo en caja: apertura + ventas efectivo (sin descontar egresos — solo admin los ve)
  const saldoEfectivo=(turno.saldoApertura||0)+medios.efectivo;
  // Efectivo financieras (para mostrar separado)
  const saldoEfectivoFinancieras=cobrFinancierasEfectivo;
  return{ventasTurno,egresosTurno,medios,totalVentas,totalEgresos,totalFinancieras,cobranzaCredivipTurno,cobranzaRapicuotaTurno,cobranzaPagaresTurno,totalCobrCredivip,totalCobrRapicuota,totalCobrPagares,saldoEfectivo,saldoEfectivoFinancieras};
}

    </div>
    <div class="card"><div class="card-title">Comisiones — ${mesLabel}</div>

    <tbody>${data.vendedores.map(v=>{const vv=data.ventas.filter(vt=>vt.vendedorId===v.id&&vt.mes===mes);const com=vv.reduce((s,vt)=>s+calcCom(vt),0);return`<tr><td>${v.nombre}</td><td>${vv.length}</td><td>${fmt(vv.reduce((s,vt)=>s+vt.total,0))}</td><td style="color:#a78bfa;font-weight:500">${fmt(com)}</td><td>${fmt(v.sueldo)}</td><td style="color:#4ade80;font-weight:500">${fmt(v.sueldo+com)}</td></tr>`;}).join('')}</tbody></table></div>

    <div class="card" style="margin-top:12px">
      <div class="card-title">📊 Detalle de ventas por vendedor — ${mesLabel}</div>
      ${data.vendedores.length===0?`<div class="empty">Sin vendedores cargados</div>`:
      data.vendedores.map(v=>{
        const vv=data.ventas.filter(vt=>vt.vendedorId===v.id&&vt.mes===mes&&vt.estado!=='cancelado');
        if(vv.length===0)return`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:#64748b">${v.nombre} — sin ventas este mes</div>`;
        const totalVend=vv.reduce((s,vt)=>s+vt.total,0);
        // productos vendidos agrupados
        const prods={};
        vv.forEach(vt=>vt.items.forEach(i=>{
          if(!prods[i.nombre])prods[i.nombre]={qty:0,total:0};
          prods[i.nombre].qty+=i.qty;
          prods[i.nombre].total+=i.precio*i.qty;
        }));
        const prodsSorted=Object.entries(prods).sort((a,b)=>b[1].total-a[1].total);
        return`<div style="margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:14px">

          </div>
          <table style="font-size:11px">
            <thead><tr><th>Producto</th><th>Cant.</th><th>Total</th><th>% del total</th></tr></thead>
            <tbody>${prodsSorted.map(([nombre,d])=>{
              const pct=totalVend>0?Math.round(d.total/totalVend*100):0;
              return`<tr>
                <td>${nombre}</td>
                <td style="text-align:center">${d.qty}</td>
                <td style="color:#38bdf8;font-weight:500">${fmt(d.total)}</td>

                  <span style="color:#64748b">${pct}%</span>
                </div></td>
              </tr>`;}).join('')}
            </tbody>

          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function drawInformeCharts(){
  const vpm={};data.ventas.forEach(v=>{const m=v.fecha.substring(0,7);vpm[m]=(vpm[m]||0)+v.total;});
  const cm=document.getElementById('chart-mes');
  if(cm)new Chart(cm,{type:'bar',data:{labels:Object.keys(vpm),datasets:[{data:Object.values(vpm),backgroundColor:'rgba(30,143,207,0.6)',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
  const topProds={};data.ventas.forEach(v=>v.items.forEach(i=>{topProds[i.nombre]=(topProds[i.nombre]||0)+i.qty;}));
  const sorted=Object.entries(topProds).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const ct=document.getElementById('chart-top');
  if(ct)new Chart(ct,{type:'bar',data:{labels:sorted.map(x=>x[0].substring(0,14)),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:['rgba(14,165,160,0.7)','rgba(139,92,246,0.7)','rgba(245,158,11,0.7)','rgba(34,197,94,0.7)','rgba(239,68,68,0.7)'],borderRadius:6}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{display:false}}}}});
}

function showFeedback(id,msg,tipo){
  const el=document.getElementById(id);if(!el)return;
  el.textContent=msg;el.className='scan-feedback '+tipo;
  if(scanFeedbackTimer)clearTimeout(scanFeedbackTimer);
  scanFeedbackTimer=setTimeout(()=>{if(el)el.className='scan-feedback';},3000);
}

    return`<div class="modal-bg"><div class="modal" style="max-width:500px">
      <div class="modal-title">✏️ Editar venta #${v.id}</div>
      <div class="two-col">
        <div class="form-row"><label class="form-label">Fecha</label><input type="date" id="ev-fecha" value="${v.fecha}" style="${INP}"></div>
        <div class="form-row"><label class="form-label">Estado</label>
          <select id="ev-estado" style="${INP}">
            <option value="cobrado"${v.estado==='cobrado'?' selected':''}>Cobrado</option>
            <option value="pendiente"${v.estado==='pendiente'?' selected':''}>Pendiente</option>
            <option value="cancelado"${v.estado==='cancelado'?' selected':''}>Cancelado</option>
          </select>
        </div>
      </div>
      <div class="two-col">
        <div class="form-row"><label class="form-label">Cliente</label><input type="text" id="ev-cliente" value="${v.cliente}" style="${INP}"></div>
        <div class="form-row"><label class="form-label">Teléfono</label><input type="text" id="ev-tel" value="${v.clienteTel||''}" style="${INP}"></div>
      </div>
      <div class="form-row"><label class="form-label">Medio de pago</label>
        <select id="ev-medio-pago" style="${INP}" onchange="checkMedioPagoAviso(this)">
          <option value="efectivo"${mp==='efectivo'?' selected':''}>💵 Efectivo</option>
          <option value="mercadopago"${mp==='mercadopago'?' selected':''}>💙 Mercado Pago</option>
          <option value="tarjeta"${mp==='tarjeta'?' selected':''}>💳 Tarjeta</option>
          <option value="tarjeta-nbch"${mp==='tarjeta-nbch'?' selected':''}>💳 Tarjeta NBCH</option>
          <option value="tarjeta-santander"${mp==='tarjeta-santander'?' selected':''}>💳 Santander</option>
          <option value="tarjeta-galicia"${mp==='tarjeta-galicia'?' selected':''}>💳 Yolo/Galicia</option>
          <option value="credivip"${mp==='credivip'?' selected':''}>🟠 CrediVIP</option>
          <option value="rapicuota"${mp==='rapicuota'?' selected':''}>🟣 Rapicuota</option>
          <option value="nickcel-pagares"${mp==='nickcel-pagares'?' selected':''}>📄 Nickcel Pagarés</option>
        </select>
      </div>
      <div class="two-col">
        <div class="form-row"><label class="form-label">Vendedor</label>
          <select id="ev-vendedor" style="${INP}"><option value="">Sin asignar</option>${data.vendedores.map(vd=>`<option value="${vd.id}"${v.vendedorId==vd.id?' selected':''}>${vd.nombre}</option>`).join('')}</select>
        </div>
        <div class="form-row"><label class="form-label">Factura</label>
          <select id="ev-factura" style="${INP}">
            <option value="sin-factura"${v.factura==='sin-factura'?' selected':''}>Sin factura</option>
            <option value="factura-a"${v.factura==='factura-a'?' selected':''}>Factura A</option>
            <option value="factura-b"${v.factura==='factura-b'?' selected':''}>Factura B</option>
            <option value="factura-x"${v.factura==='factura-x'?' selected':''}>Factura X</option>
          </select>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Notas</label><input type="text" id="ev-notas" value="${v.notas||''}" style="${INP}"></div>
      <div class="form-actions">
        <button class="btn" id="modal-cancel">Cancelar</button>
        <button class="btn primary" id="modal-save-editar-venta" data-id="${v.id}">Guardar cambios</button>
      </div>
    </div></div>`;
  }
  return '';
}

function actualizarComPreview(){
  const vid=document.getElementById('m-vendedor')?.value;
  const qty=parseInt(document.getElementById('m-qty')?.value)||1,precio=parseFloat(document.getElementById('m-precio')?.value)||0;
  const prev=document.getElementById('m-com-preview');if(!prev)return;
  if(!vid){prev.textContent='Seleccioná un vendedor para ver la comisión';return;}
  if(!modalProdSeleccionado){prev.textContent='Seleccioná un producto primero';return;}
  const vend=getVend(parseInt(vid));
  if(!vend){prev.textContent='—';return;}
  const pct=(vend.comisiones&&vend.comisiones[modalProdSeleccionado.categoriaId])||0,cat=getCat(modalProdSeleccionado.categoriaId);
  prev.textContent=`Comisión: ${pct}% sobre ${cat?.nombre||'cat.'} = ${fmt(precio*qty*pct/100)}`;
}

function bindApp(){
  const q=id=>document.getElementById(id);
  q('logout-btn').onclick=()=>{currentUser=null;carrito=[];clearTimeout(window._adminTimer);window._adminTimerActivo=false;render();};
  // Auto-logout admin 30 min — registrar listeners solo una vez
  clearTimeout(window._adminTimer);
  if(currentUser&&currentUser.role==='admin'){
    const INACTIVIDAD_MS=30*60*1000;
    window._resetAdminTimer=()=>{
      clearTimeout(window._adminTimer);
      window._adminTimer=setTimeout(()=>{
        if(currentUser&&currentUser.role==='admin'){
          currentUser=null;carrito=[];window._adminTimerActivo=false;render();
          alert('⏱ Sesión cerrada por inactividad (30 min).');
        }
      },INACTIVIDAD_MS);
    };
    if(!window._adminTimerActivo){
      window._adminTimerActivo=true;
      ['mousemove','keydown','click','touchstart','scroll'].forEach(ev=>
        document.addEventListener(ev,window._resetAdminTimer,{passive:true})
      );
    }
    window._resetAdminTimer();
  } else {
    if(window._adminTimerActivo&&window._resetAdminTimer){
      ['mousemove','keydown','click','touchstart','scroll'].forEach(ev=>
        document.removeEventListener(ev,window._resetAdminTimer)
      );
      window._adminTimerActivo=false;
    }
  }
  if(!window._busqClickListener){
    window._busqClickListener=true;
    document.addEventListener('click',e=>{if(!e.target.closest('.busq-prod-wrap'))document.querySelectorAll('.busq-prod-lista').forEach(l=>l.style.display='none');});
  }
  if(!window._clienteClickListener){
    window._clienteClickListener=true;
    document.addEventListener('click',function(e){if(!e.target.closest('#m-cliente-lista')&&e.target.id!=='m-cliente'){const lista=document.getElementById('m-cliente-lista');if(lista)lista.style.display='none';}});
  }
  document.querySelectorAll('.nav-tab').forEach(b=>{b.onclick=()=>{tab=b.dataset.tab;render();};});

  const svi=q('scan-venta-input');
  if(svi){svi.focus();svi.onkeydown=e=>{if(e.key==='Enter'){const cod=svi.value.trim();if(!cod)return;const prod=getProd(cod);if(!prod){showFeedback('scan-venta-feedback','Código no encontrado: '+cod,'err');svi.value='';return;}if(prod.stock<=0){showFeedback('scan-venta-feedback',prod.nombre+' — sin stock','err');svi.value='';return;}const ex=carrito.find(i=>i.productoId===prod.id);if(ex)ex.qty++;else carrito.push({productoId:prod.id,nombre:prod.nombre,codigo:prod.codigo,categoriaId:prod.categoriaId,precio:prod.precio,qty:1});showFeedback('scan-venta-feedback','✓ '+prod.nombre+' agregado','ok');svi.value='';render();}};}

  document.querySelectorAll('.carrito-plus').forEach(b=>{b.onclick=()=>{if(carrito[b.dataset.idx])carrito[b.dataset.idx].qty++;render();};});
  document.querySelectorAll('.carrito-minus').forEach(b=>{b.onclick=()=>{const idx=parseInt(b.dataset.idx);if(carrito[idx]){carrito[idx].qty--;if(carrito[idx].qty<=0)carrito.splice(idx,1);}render();};});
  document.querySelectorAll('.carrito-del').forEach(b=>{b.onclick=()=>{carrito.splice(parseInt(b.dataset.idx),1);render();};});
  const vcb=q('vaciar-carrito-btn');if(vcb)vcb.onclick=()=>{carrito=[];render();};
  const cvsb=q('confirmar-venta-scan-btn');if(cvsb)cvsb.onclick=()=>{if(carrito.length>0){modal={type:'confirmar-venta-scan'};render();}};

  const ssi=q('scan-stock-input'),ssb=q('scan-stock-btn');
  if(ssi&&ssb){const doScan=()=>{const cod=ssi.value.trim(),qty=parseInt(q('scan-stock-qty')?.value)||1;if(!cod)return;const prod=getProd(cod);if(!prod){showFeedback('scan-stock-feedback','Código no encontrado: '+cod,'err');ssi.value='';return;}prod.stock+=qty;save(data);showFeedback('scan-stock-feedback',`✓ ${prod.nombre}: +${qty} → stock: ${prod.stock}`,'ok');ssi.value='';render();};ssi.onkeydown=e=>{if(e.key==='Enter')doScan();};ssb.onclick=doScan;}

  const nvb=q('nueva-venta-btn');if(nvb)nvb.onclick=()=>{window._prodManualSel=null;modal={type:'nueva-venta',carrito:[],vendedorId:currentUser.vendedorId||''};render();};
  const devb=q('devolucion-btn');if(devb)devb.onclick=()=>{modal={type:'devolucion'};render();};
  const neb=q('nuevo-egreso-btn');if(neb)neb.onclick=()=>{modal={type:'nuevo-egreso'};render();};
  const npb=q('nuevo-prod-btn');if(npb)npb.onclick=()=>{modal={type:'nuevo-prod'};render();};
  const qfc=q('quitar-filtro-cat');if(qfc)qfc.onclick=()=>{filtroCategoria=null;render();};
  const ncb=q('nuevo-contacto-btn');if(ncb)ncb.onclick=()=>{modal={type:'nuevo-contacto'};render();};
  const nprovb=q('nuevo-prov-btn');if(nprovb)nprovb.onclick=()=>{modal={type:'nuevo-proveedor'};render();};
  const nppb=q('nuevo-prov-desde-prod-btn');if(nppb)nppb.onclick=()=>{modal={type:'nuevo-proveedor',desde:'prod'};render();};
  const nvend=q('nuevo-vend-btn');if(nvend)nvend.onclick=()=>{modal={type:'nuevo-vend'};render();};
  const ncatb=q('nueva-cat-btn');if(ncatb)ncatb.onclick=()=>{modal={type:'nueva-cat'};render();};
  const nub=q('nuevo-user-btn');if(nub)nub.onclick=()=>{modal={type:'nuevo-user'};render();};
  const cmb=q('cerrar-mes-btn');if(cmb)cmb.onclick=()=>{const mes=mesActual();modal={type:'cerrar-mes',mes,detalle:data.vendedores.map(v=>{const vv=data.ventas.filter(vt=>vt.vendedorId===v.id&&vt.mes===mes);const com=vv.reduce((s,vt)=>s+calcCom(vt),0);return{id:v.id,nombre:v.nombre,sueldo:v.sueldo,comision:com,ventas:vv.length,total:v.sueldo+com};})};render();};

  // CIERRE DE CAJA — abrir turno
  const btnAbrir=q('btn-abrir-turno');
  if(btnAbrir)btnAbrir.onclick=()=>{
    const saldoInp=parseFloat(q('inp-saldo-apertura')?.value)||0;
    if(!data.turnosCaja)data.turnosCaja=[];
    if(!data.nextId.turno)data.nextId.turno=1;
    const ahora=Date.now();
    const turno={
      id:data.nextId.turno++,
      usuarioId:currentUser.id,
      usuarioNombre:currentUser.name,
      usuarioVendedorId:currentUser.vendedorId||null, // vendedorId para filtrar ventas
      fecha:getFechaHoyISO(),
      estado:'abierto',
      saldoApertura:saldoInp,
      apertura:{hora:getHoraActual(),ts:ahora},
      cierre:null,
      vistoPorAdmin:false
    };
    data.turnosCaja.push(turno);
    save(data);render();
  };

  // CIERRE DE CAJA — cerrar turno
  const btnCerrar=q('btn-cerrar-turno');
  if(btnCerrar)btnCerrar.onclick=()=>{
    const turno=getTurnoActivo();
    if(!turno)return;
    const tot=calcTotalesTurno(turno);
    const ahora=Date.now();
    turno.cierre={hora:getHoraActual(),ts:ahora};
    turno.estado='cerrado';
    turno.vistoPorAdmin=false;
    turno.resumen=tot;
    save(data);
    // Generar comprobante y abrir WhatsApp para admin
    const user=data.users.find(u=>u.role==='admin');
    const lineas=[
      `🏪 *CIERRE DE CAJA — ${turno.usuarioNombre}*`,
      `📅 Fecha: ${turno.fecha}`,
      `⏰ Apertura: ${turno.apertura.hora}`,
      `⏰ Cierre: ${turno.cierre.hora}`,
      `💰 Saldo apertura: $${(turno.saldoApertura||0).toLocaleString('es-AR')}`,
      ``,
      `📊 *VENTAS DEL TURNO (${tot.ventasTurno.length})*`,
      tot.medios.efectivo>0?`💵 Efectivo: $${tot.medios.efectivo.toLocaleString('es-AR')}`:'',
      tot.medios.mercadopago>0?`💙 Mercado Pago: $${tot.medios.mercadopago.toLocaleString('es-AR')}`:'',
      tot.medios.tarjeta>0?`💳 Tarjetas: $${tot.medios.tarjeta.toLocaleString('es-AR')}`:'',
      tot.medios.credivip>0?`🟠 CrediVIP: $${tot.medios.credivip.toLocaleString('es-AR')}`:'',
      tot.medios.rapicuota>0?`🟣 Rapicuota: $${tot.medios.rapicuota.toLocaleString('es-AR')}`:'',
      tot.medios['nickcel-pagares']>0?`📄 Pagarés: $${tot.medios['nickcel-pagares'].toLocaleString('es-AR')}`:'',
      `📥 *Total ventas: $${tot.totalVentas.toLocaleString('es-AR')}*`,
      ``,
      ...(tot.totalFinancieras>0?[
        `💼 *COBROS FINANCIERAS*`,
        tot.totalCobrCredivip>0?`🟠 CrediVIP (${tot.cobranzaCredivipTurno.length} cobros): $${tot.totalCobrCredivip.toLocaleString('es-AR')}`:'',
        tot.totalCobrRapicuota>0?`🟣 Rapicuota (${tot.cobranzaRapicuotaTurno.length} cobros): $${tot.totalCobrRapicuota.toLocaleString('es-AR')}`:'',
        tot.totalCobrPagares>0?`📄 Pagarés (${tot.cobranzaPagaresTurno.length} cobros): $${tot.totalCobrPagares.toLocaleString('es-AR')}`:'',
        `💼 *Total financieras: $${tot.totalFinancieras.toLocaleString('es-AR')}*`,
        ``,
      ]:[]),
      tot.totalEgresos>0?`📤 *Egresos: $${tot.totalEgresos.toLocaleString('es-AR')}*`:'',
      `💵 *Efectivo en caja: $${tot.saldoEfectivo.toLocaleString('es-AR')}*`,
    ].filter(l=>l!=='').join('\n');
    const adminTel='5493644570637'; // número de Nico
    window.open('https://wa.me/'+adminTel+'?text='+encodeURIComponent(lineas),'_blank');
    render();
  };

  // CIERRE DE CAJA — marcar notificaciones como vistas (admin)
  const btnVisto=q('marcar-vistos-btn');
  if(btnVisto)btnVisto.onclick=()=>{
    (data.turnosCaja||[]).forEach(t=>{if(t.cierre&&!t.vistoPorAdmin)t.vistoPorAdmin=true;});
    save(data);render();
  };
  // CIERRE DE CAJA — eliminar turno (admin)
  document.querySelectorAll('[data-del-turno]').forEach(b=>{
    b.onclick=()=>{
      if(!confirm('¿Eliminar este turno? Solo se elimina el registro del turno, no las ventas.'))return;
      data.turnosCaja=(data.turnosCaja||[]).filter(t=>t.id!=b.dataset.delTurno);
      save(data);render();
    };
  });

  document.querySelectorAll('[data-edit-user]').forEach(b=>{b.onclick=()=>{const u=data.users.find(x=>x.id==b.dataset.editUser);modal={type:'edit-user',user:u};render();};});
  document.querySelectorAll('[data-pass-user]').forEach(b=>{b.onclick=()=>{const u=data.users.find(x=>x.id==b.dataset.passUser);modal={type:'cambiar-pass',user:u};render();};});
  document.querySelectorAll('[data-del-user]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar usuario?')){data.users=data.users.filter(u=>u.id!=b.dataset.delUser);save(data);render();}};});
  document.querySelectorAll('[data-ver-venta]').forEach(b=>{b.onclick=()=>{const v=data.ventas.find(x=>x.id==b.dataset.verVenta);modal={type:'ver-venta',venta:v};render();};});
  document.querySelectorAll('[data-edit-venta]').forEach(b=>{b.onclick=()=>{const v=data.ventas.find(x=>x.id==b.dataset.editVenta);if(v){modal={type:'editar-venta',venta:v};render();}};});
  const msev=q('modal-save-editar-venta');
  if(msev)msev.onclick=()=>{
    const id=parseInt(msev.dataset.id);

  document.querySelectorAll('[data-cobrar]').forEach(b=>{b.onclick=()=>{const v=data.ventas.find(x=>x.id==b.dataset.cobrar);modal={type:'cobrar-venta',venta:v};render();};});
  document.querySelectorAll('[data-del-venta]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.ventas=data.ventas.filter(v=>v.id!=b.dataset.delVenta);save(data);render();}};});
  document.querySelectorAll('[data-pagar]').forEach(b=>{b.onclick=()=>{const e=data.egresos.find(x=>x.id==b.dataset.pagar);if(e){e.pagado=true;if(e.fuente==='NBCH'){if(!data.nbch)data.nbch=[];data.nbch.push({id:data.nextId.nbch++,fecha:e.fecha,concepto:'Egreso: '+e.concepto,tipo:'egreso',monto:e.monto});}else if(e.fuente==='Brubank'){if(!data.brubank)data.brubank=[];data.brubank.push({id:data.nextId.brubank++,fecha:e.fecha,concepto:'Egreso: '+e.concepto,tipo:'egreso',monto:e.monto});}else if(e.fuente==='Galicia'){if(!data.galicia)data.galicia=[];data.galicia.push({id:data.nextId.galicia++,fecha:e.fecha,concepto:'Egreso: '+e.concepto,tipo:'egreso',monto:e.monto});}else if(e.fuente==='Mercado Pago'){if(!data.mercadopago)data.mercadopago=[];data.mercadopago.push({id:data.nextId.mercadopago++,fecha:e.fecha,descripcion:'Egreso: '+e.concepto,tipo:'egreso',monto:e.monto});}else if(e.fuente==='Supervielle'){if(!data.supervielle)data.supervielle=[];data.supervielle.unshift({id:data.nextId.supervielle++,fecha:e.fecha,tipo:'egreso',descripcion:'Egreso: '+e.concepto,monto:e.monto});}else if(e.fuente==='Cobr. CrediVIP'){if(!data.cobranzaCredivip)data.cobranzaCredivip=[];data.cobranzaCredivip.push({id:data.nextId.cobranzaCredivip++,fecha:e.fecha,cliente:'Egreso',dni:'',nroCuota:0,monto:-e.monto,formaPago:'efectivo',notas:'Egreso: '+e.concepto});}else if(e.fuente==='Cobr. Rapicuota'){if(!data.cobranzaRapicuota)data.cobranzaRapicuota=[];data.cobranzaRapicuota.push({id:data.nextId.cobranzaRapicuota++,fecha:e.fecha,cliente:'Egreso',dni:'',nroCuota:0,monto:-e.monto,formaPago:'efectivo',notas:'Egreso: '+e.concepto});}save(data);render();}};});
  document.querySelectorAll('[data-del-egreso]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.egresos=data.egresos.filter(e=>e.id!=b.dataset.delEgreso);save(data);render();}};});
  document.querySelectorAll('[data-edit-prod]').forEach(b=>{b.onclick=()=>{const p=data.productos.find(x=>x.id==b.dataset.editProd);modal={type:'nuevo-prod',prod:p};render();};});
  document.querySelectorAll('[data-del-prod]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.productos=data.productos.filter(p=>p.id!=b.dataset.delProd);save(data);render();}};});
  const lbp=q('limpiar-busq-prod');if(lbp)lbp.onclick=()=>{window._busqProd='';const inp=q('busq-prod-tabla');if(inp)inp.value='';filtrarProductosTabla();};
  document.querySelectorAll('[data-del-contacto]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.contactos=data.contactos.filter(c=>c.id!=b.dataset.delContacto);save(data);render();}};});
  document.querySelectorAll('[data-del-prov]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar este proveedor?')){data.proveedores=data.proveedores.filter(p=>p.id!=b.dataset.delProv);save(data);render();}};});
  document.querySelectorAll('[data-del-cat]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.categorias=data.categorias.filter(c=>c.id!=b.dataset.delCat);save(data);render();}};});
  document.querySelectorAll('[data-edit-vend]').forEach(b=>{b.onclick=()=>{const v=data.vendedores.find(x=>x.id==b.dataset.editVend);modal={type:'nuevo-vend',vend:v};render();};});
  document.querySelectorAll('[data-com-vend]').forEach(b=>{b.onclick=()=>{const v=data.vendedores.find(x=>x.id==b.dataset.comVend);modal={type:'comisiones-vend',vend:v};render();};});
  document.querySelectorAll('[data-del-vend]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar este vendedor? Las ventas asociadas quedarán sin vendedor asignado.')){{data.vendedores=data.vendedores.filter(v=>v.id!=b.dataset.delVend);save(data);render();}}}; });

window.calcCreditoPreview=function(){};
window.calcCreditoNuevo=function(){
  const RECARGOS={3:0.15,4:0.25,6:0.31,8:0.35};
  const contado=parseFloat(document.getElementById('c-precio-contado')?.value)||0;
  const entrega=parseFloat(document.getElementById('c-entrega')?.value)||0;
  const n=parseInt(document.getElementById('c-ncuotas')?.value)||0;
  const calc=document.getElementById('credito-calc');
  if(!calc)return;
  if(!contado||!n||!(n in RECARGOS)){calc.style.display='none';return;}
  const saldo=Math.max(0,contado-entrega);
  const pct=RECARGOS[n];
  const totalConRecargo=Math.round(saldo*(1+pct));
  const montoCuota=Math.round(totalConRecargo/n);
  document.getElementById('c-monto-cuota').value=montoCuota;
  calc.style.display='block';
  document.getElementById('calc-saldo').textContent='$'+saldo.toLocaleString('es-AR');
  document.getElementById('calc-recargo').textContent=(pct*100)+'%';
  document.getElementById('calc-total-recargo').textContent='$'+totalConRecargo.toLocaleString('es-AR');
  document.getElementById('calc-cuota').textContent='$'+montoCuota.toLocaleString('es-AR');
  document.getElementById('calc-cuota-letras').textContent=numToLetras(montoCuota)+' pesos';
};
function generarCuotasSemanales(fechaInicio,nCuotas,montoCuota,diaCobro){
  const cuotas=[];
  let fecha=new Date(fechaInicio+'T12:00:00');
  fecha.setDate(fecha.getDate()+7);
  const diaActual=fecha.getDay();
  const diaCob=parseInt(diaCobro);
  let diff=diaCob-diaActual;
  if(diff<0)diff+=7;
  fecha.setDate(fecha.getDate()+diff);
  for(let i=0;i<nCuotas;i++){
    cuotas.push({nro:i+1,fecha:fecha.toISOString().split('T')[0],monto:montoCuota,pagada:false,fechaPago:null});
    fecha=new Date(fecha);
    fecha.setDate(fecha.getDate()+7);
  }
  return cuotas;
}

function numToLetras(n){
  const u=['','un','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte'];
  const d=['','','veinti','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const c=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n===100)return'cien';if(n<21)return u[n];
  if(n<100){const dd=Math.floor(n/10);const uu=n%10;return uu===0?d[dd]:dd===2?'veinti'+u[uu]:d[dd]+' y '+u[uu];}
  if(n<1000){const cc=Math.floor(n/100);const r=n%100;return r===0?c[cc]:c[cc]+' '+numToLetras(r);}
  if(n<1000000){const m=Math.floor(n/1000);const r=n%1000;const pm=m===1?'mil':numToLetras(m)+' mil';return r===0?pm:pm+' '+numToLetras(r);}
  return n.toLocaleString('es-AR');
}

};

document.addEventListener('input',function(e){
  if(e.target&&e.target.id==='m-pdesc-efectivo'){
    const pct=parseFloat(e.target.value)||0;
    const precio=parseFloat(document.getElementById('m-pprecio')?.value)||0;
    const prev=document.getElementById('m-pdesc-preview');
    if(prev&&precio>0&&pct>0)prev.textContent='→ Precio con desc: '+precio*(1-pct/100).toFixed(0).toLocaleString('es-AR');
    else if(prev)prev.textContent='';
  }
});
window.checkMedioPagoAviso=function(sel){
  const aviso=document.getElementById('aviso-medio-pago');
  if(!aviso)return;
  const msgs={
    'credivip':'🟠 CrediVIP — quedará pendiente hasta que confirmes la liquidación.',
    'rapicuota':'🟣 Rapicuota — quedará pendiente hasta que confirmes la liquidación.',
    'mercadopago':'💙 Mercado Pago — se acredita en el acto al saldo de MP.',
    'nickcel-pagares':'📄 Nickcel Pagarés — quedará pendiente hasta confirmar el pagaré.',
    'tarjeta-nbch':'💳 Tarjeta NBCH — quedará pendiente. El banco deposita a las 48hs; el sistema te avisará cuando venza el plazo.',
    'tarjeta-santander':'💳 Santander (Brubank) — quedará pendiente. Paga a las 48hs hábiles; el sistema te avisará cuando venza el plazo.',
    'tarjeta-galicia':'💳 Yolo/Galicia — quedará pendiente. Paga a las 48hs hábiles; el sistema te avisará cuando venza el plazo.'
  };
  if(msgs[sel.value]){aviso.textContent=msgs[sel.value];aviso.style.display='block';}
  else{aviso.style.display='none';}
  // Mostrar/ocultar selector subtipo MP
  const slot=document.getElementById('mp-subtipo-slot')||document.getElementById('mp-subtipo-slot-scan');
  if(slot)slot.style.display=sel.value==='mercadopago'?'block':'none';
};
</script>

</body></html>
