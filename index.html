<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1a6fb5;--blue2:#1e8fcf;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--dark:#0f172a;--dark2:#1e293b;--dark3:#334155;--text:#f1f5f9;--text2:#94a3b8;--border:rgba(255,255,255,0.08);--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--font-mono:'SF Mono','Fira Code',monospace}
#app{background:var(--dark);min-height:600px;font-family:var(--font-sans);color:var(--text)}
.topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:0 12px;display:flex;align-items:center;gap:4px;height:46px}
.logo{font-size:15px;font-weight:500;color:#fff;margin-right:8px;white-space:nowrap}.logo span{color:var(--blue2)}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-tab{padding:5px 10px;font-size:11.5px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:6px;white-space:nowrap}
.nav-tab.active{background:rgba(30,143,207,0.18);color:var(--blue2);font-weight:500}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.06)}
.ub{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.logout{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer}
.content{padding:14px 16px}
.btn{padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);font-size:12px;cursor:pointer}
.btn:hover{background:rgba(255,255,255,0.11)}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:#1460a0}
.btn.success{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#4ade80}
.btn.success:hover{background:rgba(34,197,94,0.25)}
.btn.danger{background:transparent;border-color:rgba(239,68,68,0.4);color:var(--red)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden}
.metric-icon{font-size:17px;margin-bottom:5px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.metric-value{font-size:18px;font-weight:500}
.metric-accent{position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 10px 10px 0}
.m1 .metric-accent{background:var(--blue2)}.m2 .metric-accent{background:var(--green)}.m3 .metric-accent{background:var(--red)}.m4 .metric-accent{background:var(--amber)}.m5 .metric-accent{background:var(--purple)}
.card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:12px}
canvas{display:block}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:rgba(255,255,255,0.04)}
th{padding:8px 10px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.03)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.badge.cobrado{background:rgba(34,197,94,0.15);color:#4ade80}
.badge.pendiente{background:rgba(245,158,11,0.15);color:#fbbf24}
.badge.cancelado{background:rgba(239,68,68,0.15);color:#f87171}
.badge.pagado{background:rgba(139,92,246,0.15);color:#a78bfa}
.badge.admin{background:rgba(30,143,207,0.2);color:#38bdf8}
.badge.vendedor{background:rgba(139,92,246,0.15);color:#a78bfa}
.modal-bg{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.65);display:flex;align-items:flex-start;justify-content:center;padding-top:20px;z-index:10}
.modal{background:var(--dark2);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:14px}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.empty{text-align:center;padding:36px;color:var(--text2);font-size:13px}
.actions-cell{display:flex;gap:5px}
.resumen-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.resumen-item{flex:1;min-width:120px;background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px}
.resumen-ico{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.resumen-label{font-size:10px;color:var(--text2)}
.resumen-val{font-size:15px;font-weight:500}
.scan-bar{display:flex;align-items:center;gap:8px;background:rgba(30,143,207,0.08);border:1px solid rgba(30,143,207,0.25);border-radius:10px;padding:10px 14px;margin-bottom:14px}
.scan-bar input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px;font-family:var(--font-sans)}
.scan-bar input::placeholder{color:#475569}
.scan-feedback{font-size:12px;padding:6px 12px;border-radius:7px;margin-bottom:10px;display:none}
.scan-feedback.ok{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:#4ade80;display:block}
.scan-feedback.err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171;display:block}
.carrito-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:6px}
.carrito-nom{flex:1;font-size:12px}
.carrito-qty{display:flex;align-items:center;gap:6px}
.carrito-qty button{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,0.06);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.carrito-qty span{font-size:13px;font-weight:500;min-width:20px;text-align:center}
.carrito-precio{font-size:12px;color:#94a3b8;min-width:80px;text-align:right}
.carrito-total{font-size:13px;font-weight:500;min-width:90px;text-align:right}
.carrito-del{background:transparent;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:2px 4px}
.stock-scan-box{background:rgba(30,143,207,0.08);border:1px solid rgba(30,143,207,0.25);border-radius:10px;padding:14px;margin-bottom:14px}
.user-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;align-items:center;gap:14px}
.user-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;flex-shrink:0}
.vendedor-card{background:var(--dark2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.vc-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.vc-avatar{width:40px;height:40px;border-radius:50%;background:rgba(30,143,207,0.2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:#38bdf8;flex-shrink:0}
.comisiones-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:8px}
.com-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.com-cat{font-size:11px;color:var(--text2);margin-bottom:3px}
.cierre-card{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);border-radius:10px;padding:14px;margin-bottom:10px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:520px;background:var(--dark)}
.login-card{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:28px;width:300px}
.login-logo{font-size:20px;font-weight:500;text-align:center;margin-bottom:20px}.login-logo span{color:var(--blue2)}
@media print{
  .topbar,.nav-tabs,.btn,.actions-cell{display:none!important}
  .modal-bg{position:static;background:none;padding:0}
  .modal{max-height:none;overflow:visible;border:none;background:#fff}
  body,#app,#root{background:#fff!important;color:#111!important}
}

/* BUSQUEDA MANUAL DE PRODUCTOS */
.busq-prod-wrap{position:relative;margin-bottom:8px}
.busq-prod-input{width:100%;padding:8px 12px 8px 34px;border:1px solid rgba(30,143,207,0.3);border-radius:8px;background:rgba(8,21,42,0.5);color:var(--text);font-size:13px;font-family:var(--font-sans);outline:none;transition:border-color .2s}

.busq-prod-item{padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.busq-prod-item:last-child{border-bottom:none}
.busq-prod-item:hover,.busq-prod-item:focus{background:rgba(30,143,207,0.15)}
.bpi-nombre{font-weight:500;color:var(--text)}
.bpi-det{font-size:11px;color:var(--text2)}
.bpi-precio{color:#4ade80;font-weight:500;white-space:nowrap;margin-left:8px}
.prod-sel-box{background:rgba(30,143,207,0.1);border:1px solid rgba(30,143,207,0.3);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.psb-cambiar{font-size:11px;color:var(--blue3);cursor:pointer;text-decoration:underline;white-space:nowrap;margin-left:8px}
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBtc6hpLaOc7LdxSw7R_uK7b3GcKF3N7As",
  authDomain: "nickel-gestion.firebaseapp.com",
  projectId: "nickel-gestion",
  storageBucket: "nickel-gestion.firebasestorage.app",
  messagingSenderId: "307668297535",
  appId: "1:307668297535:web:4843d9590e6fa352ca158a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOC_REF = doc(db, "nickel", "data");

window._fbSave = async function(d) {
  try { await setDoc(DOC_REF, { payload: JSON.stringify(d) }); } catch(e) { console.error("Firebase save error:", e); }
};
window._fbLoad = async function() {
  try { const snap = await getDoc(DOC_REF); if(snap.exists()) return JSON.parse(snap.data().payload); } catch(e) { console.error("Firebase load error:", e); }
  return null;
};
window._fbListen = function(callback) {
  return onSnapshot(DOC_REF, (snap) => {
    if(snap.exists()) { try { const d = JSON.parse(snap.data().payload); callback(d); } catch(e) {} }
  });
};
window._firebaseReady = true;
document.dispatchEvent(new Event('firebase-ready'));
</script>

function load(){
  try{const r=localStorage.getItem(SK);if(r){const d=JSON.parse(r);if(!d.users||d.users.length===0)d.users=JSON.parse(JSON.stringify(def.users));if(!d.creditos)d.creditos=[];if(!d.nextId.credito)d.nextId.credito=1;return d;}}catch(e){}
  return JSON.parse(JSON.stringify(def));
}
async function loadFromFirebase(){
  if(window._fbLoad){
    const d=await window._fbLoad();
    if(d){
      if(!d.users||d.users.length===0)d.users=JSON.parse(JSON.stringify(def.users));
      if(!d.creditos)d.creditos=[];
      if(!d.nextId.credito)d.nextId.credito=1;
      try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}
      return d;
    }
  }
  return load();
}
function save(d){
  try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}
  if(window._firebaseReady&&window._fbSave)window._fbSave(d);
}

let data=load(),currentUser=null,tab='dashboard',modal=null,carrito=[];
let modalProdSeleccionado=null;
let scanFeedbackTimer=null;
let _fbUnsubscribe=null;
let _fbInitialized=false;

async function initApp(){
  document.getElementById('root').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:400px;background:#0f172a"><div style="text-align:center;color:#94a3b8"><div style="font-size:20px;font-weight:500;color:#fff;margin-bottom:8px">NickGestión</div><div style="font-size:13px">Conectando con la nube...</div></div></div>';
  try{const fbData=await loadFromFirebase();if(fbData)data=fbData;}catch(e){console.log("Usando datos locales");}
  _fbInitialized=true;
  render();
  if(window._fbListen){
    _fbUnsubscribe=window._fbListen((newData)=>{
      if(_fbInitialized&&currentUser){
        data=newData;
        if(!data.creditos)data.creditos=[];
        if(!data.nextId.credito)data.nextId.credito=1;
        try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){}
        render();
      }
    });
  }
}

if(window._firebaseReady){initApp();}
else{document.addEventListener('firebase-ready',initApp);setTimeout(()=>{if(!_fbInitialized)initApp();},3000);}

const fmt=n=>'$'+Math.round(n).toLocaleString('es-AR');
const fd=d=>d?d.split('-').reverse().join('/'):'';
const getCat=id=>data.categorias.find(c=>c.id==id);
const getVend=id=>data.vendedores.find(v=>v.id==id);
const getProd=cod=>data.productos.find(p=>p.codigo===cod.trim());
const getProdById=id=>data.productos.find(p=>p.id==id);
function calcCom(venta){const v=getVend(venta.vendedorId);if(!v)return 0;return venta.items.reduce((s,i)=>{const pct=(v.comisiones&&v.comisiones[i.categoriaId])||0;return s+(i.precio*i.qty*pct/100);},0);}

function render(){
  const root=document.getElementById('root');
  if(!currentUser){root.innerHTML=renderLogin();bindLogin();return;}
  root.innerHTML=renderApp();bindApp();
  if(tab==='dashboard')setTimeout(drawCharts,50);
  if(tab==='informes')setTimeout(drawInformeCharts,50);
}

function renderLogin(){
  return`<div class="login-wrap"><div class="login-card">
    <div class="login-logo">Nick<span>Gestión</span></div>
    <div class="form-row"><label class="form-label">Email</label><input id="l-email" type="text" value="nico@local" style="background:#0f172a;width:100%;padding:7px 10px;border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#f1f5f9;font-size:12px"></div>
    <div class="form-row"><label class="form-label">Contraseña</label><input id="l-pass" type="password" value="" style="background:#0f172a;width:100%;padding:7px 10px;border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#f1f5f9;font-size:12px"></div>
    <div id="l-err" style="color:#f87171;font-size:11px;margin-bottom:8px;display:none">Usuario o contraseña incorrectos</div>
    <button class="btn primary" id="l-btn" style="width:100%;padding:9px">Ingresar</button>
  </div></div>`;
}
function bindLogin(){
  const go=()=>{const e=document.getElementById('l-email').value.trim(),p=document.getElementById('l-pass').value;const u=data.users.find(u=>u.email===e&&u.password===p);if(u){currentUser=u;carrito=[];render();}else{document.getElementById('l-err').style.display='block';}};
  document.getElementById('l-btn').onclick=go;
  document.getElementById('l-pass').onkeydown=e=>{if(e.key==='Enter')go();};
}

function renderApp(){
  const allTabs=['dashboard','ventas','egresos','productos','contactos','vendedores','categorias','caja','informes','financiera','usuarios'];
  const labels={dashboard:'Dashboard',ventas:'Ventas',egresos:'Egresos',productos:'Productos',contactos:'Contactos',vendedores:'Vendedores',categorias:'Categorías',caja:'Caja',informes:'Informes',financiera:'Financiera',usuarios:'Usuarios'};
  const tabs=currentUser.role==='admin'?allTabs:['ventas','productos','contactos','financiera'];
  return`<div style="position:relative;min-height:600px">
    <div class="topbar">
      <span class="logo">Nick<span>Gestión</span></span><span id="sync-indicator" style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(34,197,94,0.15);color:#4ade80;margin-left:4px">● En línea</span>

      <div class="ub"><span style="color:#fff">${currentUser.name}</span><span style="font-size:10px;background:rgba(30,143,207,0.2);color:#38bdf8;padding:2px 7px;border-radius:10px">${currentUser.role}</span><button class="logout" id="logout-btn">Salir</button></div>

window.buscarProdScan = function() {
  const q = document.getElementById('busq-prod-scan')?.value.trim().toLowerCase();
  const lista = document.getElementById('busq-prod-lista-scan');
  if(!lista) return;
  if(!q){lista.style.display='none';return;}
  const res = data.productos.filter(p=>p.nombre.toLowerCase().includes(q)||p.codigo.includes(q)).slice(0,8);
  if(!res.length){lista.style.display='none';return;}
  lista.innerHTML = res.map(p=>{const c=getCat(p.categoriaId);return`<div class="busq-prod-item" onclick="agregarProdDesdeSearch(${p.id})"><div><div class="bpi-nombre">${p.nombre}</div><div class="bpi-det">${c?c.nombre:''} · Stock: ${p.stock}</div></div><div class="bpi-precio">${fmt(p.precio)}</div></div>`;}).join('');
  lista.style.display='block';
}
window.agregarProdDesdeSearch = function(pid) {
  const prod=getProdById(pid);if(!prod)return;
  document.getElementById('busq-prod-lista-scan').style.display='none';
  document.getElementById('busq-prod-scan').value='';
  if(prod.stock<=0){showFeedback('scan-venta-feedback',prod.nombre+' — sin stock','err');return;}
  const ex=carrito.find(i=>i.productoId===prod.id);
  if(ex)ex.qty++; else carrito.push({productoId:prod.id,nombre:prod.nombre,codigo:prod.codigo,categoriaId:prod.categoriaId,precio:prod.precio,qty:1});
  showFeedback('scan-venta-feedback','✓ '+prod.nombre+' agregado','ok');
  render();
}

function renderCaja(){
  const ing=data.ventas.reduce((s,v)=>s+v.cobrado,0),eg=data.egresos.filter(e=>e.pagado).reduce((s,e)=>s+e.monto,0);
  const movs=[...data.ventas.filter(v=>v.cobrado>0).map(v=>({fecha:v.fecha,concepto:'Venta — '+v.cliente,tipo:'ingreso',monto:v.cobrado})),...data.egresos.filter(e=>e.pagado).map(e=>({fecha:e.fecha,concepto:e.concepto,tipo:'egreso',monto:e.monto}))].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  return`<div>
    <div class="section-header"><span style="font-size:17px;font-weight:500">Caja</span></div>
    <div class="metrics">

      <div class="metric m3"><div class="metric-accent"></div><div class="metric-icon">📉</div><div class="metric-label">Egresos</div><div class="metric-value" style="color:#f87171">${fmt(eg)}</div></div>
      <div class="metric m1"><div class="metric-accent"></div><div class="metric-icon">💵</div><div class="metric-label">Saldo</div><div class="metric-value" style="color:${ing-eg>=0?'#4ade80':'#f87171'}">${fmt(ing-eg)}</div></div>
      <div class="metric m4"><div class="metric-accent"></div><div class="metric-icon">⏳</div><div class="metric-label">A cobrar</div><div class="metric-value" style="color:#fbbf24">${fmt(data.ventas.reduce((s,v)=>s+(v.total-v.cobrado),0))}</div></div>

function renderInformes(){

  return`<div>

function drawInformeCharts(){
  const vpm={};data.ventas.forEach(v=>{const m=v.fecha.substring(0,7);vpm[m]=(vpm[m]||0)+v.total;});
  const cm=document.getElementById('chart-mes');
  if(cm)new Chart(cm,{type:'bar',data:{labels:Object.keys(vpm),datasets:[{data:Object.values(vpm),backgroundColor:'rgba(30,143,207,0.6)',borderRadius:6}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10},callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
  const topProds={};data.ventas.forEach(v=>v.items.forEach(i=>{topProds[i.nombre]=(topProds[i.nombre]||0)+i.qty;}));
  const sorted=Object.entries(topProds).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const ct=document.getElementById('chart-top');
  if(ct)new Chart(ct,{type:'bar',data:{labels:sorted.map(x=>x[0].substring(0,14)),datasets:[{data:sorted.map(x=>x[1]),backgroundColor:['rgba(14,165,160,0.7)','rgba(139,92,246,0.7)','rgba(245,158,11,0.7)','rgba(34,197,94,0.7)','rgba(239,68,68,0.7)'],borderRadius:6}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{display:false}}}}});
}

function showFeedback(id,msg,tipo){
  const el=document.getElementById(id);if(!el)return;
  el.textContent=msg;el.className='scan-feedback '+tipo;
  if(scanFeedbackTimer)clearTimeout(scanFeedbackTimer);
  scanFeedbackTimer=setTimeout(()=>{if(el)el.className='scan-feedback';},3000);
}

    <div class="form-row"><label class="form-label">Venta</label><select id="m-dev-venta" style="${INP}">${data.ventas.map(v=>`<option value="${v.id}">${fd(v.fecha)} — ${v.cliente} — ${fmt(v.total)}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Motivo</label><textarea id="m-dev-motivo" style="${INP};height:50px;resize:vertical"></textarea></div>
    <div class="form-actions"><button class="btn" id="modal-cancel">Cancelar</button><button class="btn danger" id="modal-save-dev">Confirmar</button></div>
  </div></div>`;
  if(m.type==='cerrar-mes') return`<div class="modal-bg"><div class="modal">
    <div class="modal-title">Cerrar mes ${m.mes}</div>
    ${m.detalle.map(d=>`<div style="background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 12px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">${d.nombre}</div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#94a3b8"><span>Sueldo base</span><span>${fmt(d.sueldo)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#a78bfa"><span>Comisiones (${d.ventas} ventas)</span><span>${fmt(d.comision)}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:500;color:#4ade80;margin-top:6px;border-top:1px solid var(--border);padding-top:6px"><span>Total</span><span>${fmt(d.total)}</span></div>
    </div>`).join('')}
    <div style="text-align:right;font-size:13px">Total general: <span style="color:#4ade80;font-weight:500">${fmt(m.detalle.reduce((s,d)=>s+d.total,0))}</span></div>
    <div class="form-actions"><button class="btn" id="modal-cancel">Cancelar</button><button class="btn success" id="modal-confirm-cierre">Confirmar cierre</button></div>
  </div></div>`;
  if(m.type==='nuevo-credito')return`<div class="modal-bg"><div class="modal">${renderModalNuevoCredito()}</div></div>`;
  if(m.type==='ver-credito')return`<div class="modal-bg"><div class="modal" style="max-width:580px">${renderModalVerCredito(m.credito)}</div></div>`;
  if(m.type==='cobrar-credito')return`<div class="modal-bg"><div class="modal">${renderModalCobrarCredito(m.credito)}</div></div>`;
  if(m.type==='comp-entrega')return`<div class="modal-bg"><div class="modal" style="max-width:660px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:15px;font-weight:500">Comprobante de entrega</span>
      <div style="display:flex;gap:8px"><button class="btn primary" onclick="window.print()">Imprimir / PDF</button><button class="btn" id="modal-cancel">✕</button></div>
    </div>
    <div id="print-area">${renderComprobanteEntrega(m.credito)}</div>
  </div></div>`;
  if(m.type==='comp-cuota')return`<div class="modal-bg"><div class="modal" style="max-width:660px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:15px;font-weight:500">Comprobante de pago — Cuota ${m.cuota.nro}</span>
      <div style="display:flex;gap:8px"><button class="btn primary" onclick="window.print()">Imprimir / PDF</button><button class="btn" id="modal-cancel">✕</button></div>
    </div>
    <div id="print-area">${renderComprobanteCuota(m.credito, m.cuota)}</div>
  </div></div>`;
  if(m.type==='pagare')return`<div class="modal-bg"><div class="modal" style="max-width:700px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:15px;font-weight:500">Pagaré</span>
      <div style="display:flex;gap:8px">
        <button class="btn primary" onclick="window.print()">Imprimir / PDF</button>
        <button class="btn" id="modal-cancel">✕</button>
      </div>
    </div>
    <div id="print-area">${renderPagare(m.credito)}</div>
  </div></div>`;
  return '';
}

function actualizarComPreview(){
  const vid=document.getElementById('m-vendedor')?.value;
  const qty=parseInt(document.getElementById('m-qty')?.value)||1,precio=parseFloat(document.getElementById('m-precio')?.value)||0;
  const prev=document.getElementById('m-com-preview');if(!prev)return;
  if(!vid){prev.textContent='Seleccioná un vendedor para ver la comisión';return;}
  if(!modalProdSeleccionado){prev.textContent='Seleccioná un producto primero';return;}
  const vend=getVend(parseInt(vid));
  if(!vend){prev.textContent='—';return;}
  const pct=(vend.comisiones&&vend.comisiones[modalProdSeleccionado.categoriaId])||0,cat=getCat(modalProdSeleccionado.categoriaId);
  prev.textContent=`Comisión: ${pct}% sobre ${cat?.nombre||'cat.'} = ${fmt(precio*qty*pct/100)}`;
}

function bindApp(){
  const q=id=>document.getElementById(id);
  q('logout-btn').onclick=()=>{currentUser=null;carrito=[];render();};
  document.addEventListener('click',e=>{if(!e.target.closest('.busq-prod-wrap'))document.querySelectorAll('.busq-prod-lista').forEach(l=>l.style.display='none');});

  const nvb=q('nueva-venta-btn');if(nvb)nvb.onclick=()=>{modalProdSeleccionado=null;modal={type:'nueva-venta'};render();};
  const devb=q('devolucion-btn');if(devb)devb.onclick=()=>{modal={type:'devolucion'};render();};

  const npb=q('nuevo-prod-btn');if(npb)npb.onclick=()=>{modal={type:'nuevo-prod'};render();};
  const ncb=q('nuevo-contacto-btn');if(ncb)ncb.onclick=()=>{modal={type:'nuevo-contacto'};render();};
  const nvend=q('nuevo-vend-btn');if(nvend)nvend.onclick=()=>{modal={type:'nuevo-vend'};render();};
  const ncatb=q('nueva-cat-btn');if(ncatb)ncatb.onclick=()=>{modal={type:'nueva-cat'};render();};
  const nub=q('nuevo-user-btn');if(nub)nub.onclick=()=>{modal={type:'nuevo-user'};render();};
  const cmb=q('cerrar-mes-btn');if(cmb)cmb.onclick=()=>{const mes=mesActual();modal={type:'cerrar-mes',mes,detalle:data.vendedores.map(v=>{const vv=data.ventas.filter(vt=>vt.vendedorId===v.id&&vt.mes===mes);const com=vv.reduce((s,vt)=>s+calcCom(vt),0);return{id:v.id,nombre:v.nombre,sueldo:v.sueldo,comision:com,ventas:vv.length,total:v.sueldo+com};})};render();};

  document.querySelectorAll('[data-edit-user]').forEach(b=>{b.onclick=()=>{const u=data.users.find(x=>x.id==b.dataset.editUser);modal={type:'edit-user',user:u};render();};});
  document.querySelectorAll('[data-pass-user]').forEach(b=>{b.onclick=()=>{const u=data.users.find(x=>x.id==b.dataset.passUser);modal={type:'cambiar-pass',user:u};render();};});
  document.querySelectorAll('[data-del-user]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar usuario?')){data.users=data.users.filter(u=>u.id!=b.dataset.delUser);save(data);render();}};});
  document.querySelectorAll('[data-cobrar]').forEach(b=>{b.onclick=()=>{const v=data.ventas.find(x=>x.id==b.dataset.cobrar);modal={type:'cobrar-venta',venta:v};render();};});
  document.querySelectorAll('[data-del-venta]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.ventas=data.ventas.filter(v=>v.id!=b.dataset.delVenta);save(data);render();}};});
  document.querySelectorAll('[data-pagar]').forEach(b=>{b.onclick=()=>{const e=data.egresos.find(x=>x.id==b.dataset.pagar);if(e){e.pagado=true;save(data);render();}};});
  document.querySelectorAll('[data-del-egreso]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.egresos=data.egresos.filter(e=>e.id!=b.dataset.delEgreso);save(data);render();}};});
  document.querySelectorAll('[data-edit-prod]').forEach(b=>{b.onclick=()=>{const p=data.productos.find(x=>x.id==b.dataset.editProd);modal={type:'nuevo-prod',prod:p};render();};});
  document.querySelectorAll('[data-del-prod]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.productos=data.productos.filter(p=>p.id!=b.dataset.delProd);save(data);render();}};});
  document.querySelectorAll('[data-del-contacto]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.contactos=data.contactos.filter(c=>c.id!=b.dataset.delContacto);save(data);render();}};});
  document.querySelectorAll('[data-del-cat]').forEach(b=>{b.onclick=()=>{if(confirm('¿Eliminar?')){data.categorias=data.categorias.filter(c=>c.id!=b.dataset.delCat);save(data);render();}};});
  document.querySelectorAll('[data-edit-vend]').forEach(b=>{b.onclick=()=>{const v=data.vendedores.find(x=>x.id==b.dataset.editVend);modal={type:'nuevo-vend',vend:v};render();};});
  document.querySelectorAll('[data-com-vend]').forEach(b=>{b.onclick=()=>{const v=data.vendedores.find(x=>x.id==b.dataset.comVend);modal={type:'comisiones-vend',vend:v};render();};});

  const mc=q('modal-cancel');if(mc)mc.onclick=()=>{modal=null;modalProdSeleccionado=null;render();};

  const ncred=q('nuevo-credito-btn');if(ncred)ncred.onclick=()=>{modal={type:'nuevo-credito'};render();};
  document.querySelectorAll('[data-ver-credito]').forEach(b=>{b.onclick=()=>{const c=data.creditos.find(x=>x.id==b.dataset.verCredito);modal={type:'ver-credito',credito:c};render();};});
  document.querySelectorAll('[data-cobrar-credito]').forEach(b=>{b.onclick=()=>{const c=data.creditos.find(x=>x.id==b.dataset.cobrarCredito);modal={type:'cobrar-credito',credito:c};render();};});
  document.querySelectorAll('[data-pagare]').forEach(b=>{b.onclick=()=>{const c=data.creditos.find(x=>x.id==b.dataset.pagare);modal={type:'pagare',credito:c};render();};});
  document.querySelectorAll('[data-comp-entrega]').forEach(b=>{b.onclick=()=>{const c=data.creditos.find(x=>x.id==b.dataset.compEntrega);modal={type:'comp-entrega',credito:c};render();};});
  document.querySelectorAll('[data-pagar-cuota]').forEach(b=>{b.onclick=()=>{const c=data.creditos.find(x=>x.id==b.dataset.pagarCuota);const cuota=c.cuotas.find(x=>x.nro==b.dataset.nro);if(cuota){cuota.pagada=true;cuota.fechaPago=new Date().toISOString().split('T')[0];if(c.cuotas.every(x=>x.pagada))c.estado='cancelado';save(data);modal={type:'ver-credito',credito:c};render();}};});
  document.querySelectorAll('[data-del-credito]').forEach(b=>{b.onclick=()=>{if(currentUser.role!=='admin'){alert('Solo el administrador puede eliminar créditos.');return;}if(confirm('¿Eliminar este crédito permanentemente?')){data.creditos=data.creditos.filter(c=>c.id!=b.dataset.delCredito);save(data);modal=null;render();}};});
  document.querySelectorAll('[data-anular-cuota]').forEach(b=>{b.onclick=()=>{if(currentUser.role!=='admin'){alert('Solo el administrador puede anular pagos.');return;}if(confirm('¿Anular este pago? La cuota volverá a estado pendiente.')){const c=data.creditos.find(x=>x.id==b.dataset.anularCuota);const cuota=c.cuotas.find(x=>x.nro==b.dataset.nro);if(cuota){cuota.pagada=false;cuota.fechaPago=null;if(c.estado==='cancelado')c.estado='activo';save(data);modal={type:'ver-credito',credito:c};render();}}};});

  const msc2=q('modal-save-credito');
  if(msc2)msc2.onclick=()=>{
    const nombre=q('c-nombre').value.trim(),dni=q('c-dni').value.trim(),tel=q('c-tel').value.trim(),domicilio=q('c-domicilio').value.trim(),referencia=q('c-referencia').value.trim(),producto=q('c-producto').value.trim(),fecha=q('c-fecha').value,entrega=parseFloat(q('c-entrega').value)||0,nCuotas=parseInt(q('c-ncuotas').value)||0,montoCuota=parseFloat(q('c-monto-cuota').value)||0,diaCobro=q('c-dia-cobro').value,vendedorId=q('c-vendedor').value?parseInt(q('c-vendedor').value):null,precioContado=parseFloat(q('c-precio-contado')?.value)||0;

    const cuotas=generarCuotasSemanales(fecha,nCuotas,montoCuota,diaCobro);

  const msv=q('modal-save-venta');

    if(prod)prod.stock=Math.max(0,prod.stock-qty);
    modalProdSeleccionado=null;save(data);modal=null;render();
  };
  const msc=q('modal-save-cobro');if(msc)msc.onclick=()=>{const monto=parseFloat(q('m-monto-cobro').value)||0,venta=data.ventas.find(x=>x.id===modal.venta.id);if(venta){venta.cobrado=Math.min(venta.total,venta.cobrado+monto);venta.estado=venta.cobrado>=venta.total?'cobrado':'pendiente';}save(data);modal=null;render();};
  const mse=q('modal-save-egreso');if(mse)mse.onclick=()=>{data.egresos.unshift({id:data.nextId.egreso++,fecha:q('m-fecha-eg').value,proveedor:q('m-prov').value,concepto:q('m-concepto').value,monto:parseFloat(q('m-monto').value)||0,pagado:q('m-pagado').value==='true'});save(data);modal=null;render();};
  const msprod=q('modal-save-prod');if(msprod)msprod.onclick=()=>{if(modal.prod){const p=data.productos.find(x=>x.id===modal.prod.id);p.nombre=q('m-pnombre').value;p.codigo=q('m-pcodigo').value;p.categoriaId=parseInt(q('m-pcat').value);p.precio=parseFloat(q('m-pprecio').value)||0;p.stock=parseInt(q('m-pstock').value)||0;}else{data.productos.push({id:data.nextId.producto++,nombre:q('m-pnombre').value,codigo:q('m-pcodigo').value,categoriaId:parseInt(q('m-pcat').value)||null,precio:parseFloat(q('m-pprecio').value)||0,stock:parseInt(q('m-pstock').value)||0});}save(data);modal=null;render();};

window.calcCreditoPreview=function(){};
window.calcCreditoNuevo=function(){
  const RECARGOS={3:0.15,4:0.25,6:0.31,8:0.35};
  const contado=parseFloat(document.getElementById('c-precio-contado')?.value)||0;
  const entrega=parseFloat(document.getElementById('c-entrega')?.value)||0;
  const n=parseInt(document.getElementById('c-ncuotas')?.value)||0;
  const calc=document.getElementById('credito-calc');
  if(!calc)return;
  if(!contado||!n||!(n in RECARGOS)){calc.style.display='none';return;}
  const saldo=Math.max(0,contado-entrega);
  const pct=RECARGOS[n];
  const totalConRecargo=Math.round(saldo*(1+pct));
  const montoCuota=Math.round(totalConRecargo/n);
  // Guardar en hidden input
  const hiddenMC=document.getElementById('c-monto-cuota');
  if(hiddenMC)hiddenMC.value=montoCuota;
  // Mostrar calc
  calc.style.display='block';
  document.getElementById('calc-saldo').textContent='$'+saldo.toLocaleString('es-AR');
  document.getElementById('calc-recargo').textContent=(pct*100)+'%';
  document.getElementById('calc-total-recargo').textContent='$'+totalConRecargo.toLocaleString('es-AR');
  document.getElementById('calc-cuota').textContent='$'+montoCuota.toLocaleString('es-AR');
  document.getElementById('calc-cuota-letras').textContent=numToLetras(montoCuota)+' pesos';
};

function generarCuotasSemanales(fechaInicio,nCuotas,montoCuota,diaCobro){
  const cuotas=[];
  let fecha=new Date(fechaInicio+'T12:00:00');
  fecha.setDate(fecha.getDate()+7);
  const diaActual=fecha.getDay();
  const diaCob=parseInt(diaCobro);
  let diff=diaCob-diaActual;
  if(diff<0)diff+=7;
  fecha.setDate(fecha.getDate()+diff);
  for(let i=0;i<nCuotas;i++){
    cuotas.push({nro:i+1,fecha:fecha.toISOString().split('T')[0],monto:montoCuota,pagada:false,fechaPago:null});
    fecha=new Date(fecha);
    fecha.setDate(fecha.getDate()+7);
  }
  return cuotas;
}

function numToLetras(n){
  const u=['','un','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte'];
  const d=['','','veinti','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const c=['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  if(n===100)return'cien';if(n<21)return u[n];
  if(n<100){const dd=Math.floor(n/10);const uu=n%10;return uu===0?d[dd]:dd===2?'veinti'+u[uu]:d[dd]+' y '+u[uu];}
  if(n<1000){const cc=Math.floor(n/100);const r=n%100;return r===0?c[cc]:c[cc]+' '+numToLetras(r);}
  if(n<1000000){const m=Math.floor(n/1000);const r=n%1000;const pm=m===1?'mil':numToLetras(m)+' mil';return r===0?pm:pm+' '+numToLetras(r);}
  return n.toLocaleString('es-AR');
}

function renderComprobanteCuota(credito,cuota){

    </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:12px">
        <div><span style="color:#888">Nombre:</span> <strong>${credito.cliente}</strong></div>
        <div><span style="color:#888">DNI:</span> <strong>${credito.dni}</strong></div>
        <div><span style="color:#888">Teléfono:</span> ${credito.telefono}</div>
        <div><span style="color:#888">Producto:</span> ${credito.producto}</div>
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;font-weight:700;color:#1a3a6b;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #dde3f0;padding-bottom:3px;margin-bottom:8px">Detalle del pago</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:12px">

        <div><span style="color:#888">Vencimiento:</span> ${fd(cuota.fecha)}</div>
        <div><span style="color:#888">Cuotas pagas:</span> ${pagadas} de ${credito.cuotas.length}</div>
        <div><span style="color:#888">Saldo restante:</span> <strong style="color:${saldo>0?'#b06000':'#1a7a3a'}">${fmt(saldo)}</strong></div>
      </div>
    </div>
    <div style="background:#f0f4fb;border:2px solid #1a3a6b;border-radius:6px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin:12px 0">
